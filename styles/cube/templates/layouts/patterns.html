<t-extend template="cube:layouts/base.html">
<t-define name="head">
<t-for stylesheet in document.style.bundles.css>
<link rel="stylesheet" t-var:href="stylesheet.path" />
</t-for>
</t-define>
<t-define name="body">
<div class="pattern-library">
<nav class="pattern-nav" aria-label="Pattern categories">
<h2>Compositions</h2>
<ul>
<t-for pattern in styles.cube.patterns.compositions>
<t-let name="anchor">#<t-var name="pattern.id" /></t-let>
<li><a t-var:href="anchor"><t-var name="pattern.name" /></a></li>
</t-for>
</ul>
<h2>Blocks</h2>
<ul>
<t-for pattern in styles.cube.patterns.blocks>
<t-let name="anchor">#<t-var name="pattern.id" /></t-let>
<li><a t-var:href="anchor"><t-var name="pattern.name" /></a></li>
</t-for>
</ul>
<h2>Utilities</h2>
<ul>
<t-for pattern in styles.cube.patterns.utilities>
<t-let name="anchor">#<t-var name="pattern.id" /></t-let>
<li><a t-var:href="anchor"><t-var name="pattern.name" /></a></li>
</t-for>
</ul>
<h2>Exceptions</h2>
<ul>
<t-for pattern in styles.cube.patterns.exceptions>
<t-let name="anchor">#<t-var name="pattern.id" /></t-let>
<li><a t-var:href="anchor"><t-var name="pattern.name" /></a></li>
</t-for>
</ul>
<h2>Globals</h2>
<ul>
<t-for pattern in styles.cube.patterns.globals>
<t-let name="anchor">#<t-var name="pattern.id" /></t-let>
<li><a t-var:href="anchor"><t-var name="pattern.name" /></a></li>
</t-for>
</ul>
<h2>Fonts</h2>
<ul>
<t-for pattern in styles.cube.patterns.fonts>
<t-let name="anchor">#<t-var name="pattern.id" /></t-let>
<li><a t-var:href="anchor"><t-var name="pattern.name" /></a></li>
</t-for>
</ul>
</nav>
<main id="main-content" class="pattern-content flow">
<h1>Compositions</h1>
<t-for pattern in styles.cube.patterns.compositions>
<t-include template="cube:blocks/pattern-section.html" />
</t-for>
<h1>Blocks</h1>
<t-for pattern in styles.cube.patterns.blocks>
<t-include template="cube:blocks/pattern-section.html" />
</t-for>
<h1>Utilities</h1>
<t-for pattern in styles.cube.patterns.utilities>
<t-include template="cube:blocks/pattern-section.html" />
</t-for>
<h1>Exceptions</h1>
<t-for pattern in styles.cube.patterns.exceptions>
<t-include template="cube:blocks/pattern-section.html" />
</t-for>
<h1>Globals</h1>
<t-for pattern in styles.cube.patterns.globals>
<t-include template="cube:blocks/pattern-section.html" />
</t-for>
<h1>Fonts</h1>
<t-for pattern in styles.cube.patterns.fonts>
<t-include template="cube:blocks/pattern-section.html" />
</t-for>
</main>
</div>
</t-define>
</t-extend>
