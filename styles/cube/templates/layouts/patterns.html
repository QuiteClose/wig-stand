<t-extend template="cube:layouts/base.html">
<t-define name="head">
<link rel="stylesheet" t-var:href="document.style.css.path" />
<link rel="stylesheet" href="/assets/styles/cube/pattern-library.css" />
</t-define>
<t-define name="body">
<div class="pattern-library">
<nav class="pattern-nav" aria-label="Pattern categories">
<t-if var="document.style.patterns.tokens.items">
<h2>Tokens</h2>
<ul>
<t-for p in document.style.patterns.tokens.items>
<t-let name="purl"><t-var name="site.path" />patterns/<t-var name="p.slug" />/</t-let>
<li><a t-var:href="purl" target="pattern-preview"><t-var name="p.name" /></a></li>
</t-for>
</ul>
</t-if>
<t-if var="document.style.patterns.resets.items">
<h2>Resets</h2>
<ul>

<li><a t-var:href="purl" target="pattern-preview"><t-var name="p.name" /></a></li>
</t-for>
</ul>
</t-if>

<h2>Globals</h2>

<t-let name="purl"><t-var name="site.path" />patterns/<t-var name="p.slug" />/</t-let>

</t-for>
</ul>
</t-if>

<h2>Fonts</h2>

</t-for>
</ul>
</t-if>

<h2>Utilities</h2>

<t-for p in document.style.patterns.utilities.items>
<t-let name="purl"><t-var name="site.path" />patterns/<t-var name="p.slug" />/</t-let>
<li><a t-var:href="purl" target="pattern-preview"><t-var name="p.name" /></a></li>

</nav>
<main id="main-content" class="pattern-content">
<div class="pattern-viewport-controls">
<button type="button" data-width="320" aria-label="Mobile viewport">Mobile</button>
<button type="button" data-width="768" aria-label="Tablet viewport">Tablet</button>
<button type="button" data-width="1024" aria-label="Desktop viewport">Desktop</button>
<button type="button" data-width="100%" aria-label="Full width viewport" class="active">Full</button>
</div>
<iframe name="pattern-preview" class="pattern-preview-frame" title="Pattern preview"></iframe>
</main>
</div>
<script>
(function() {
  var buttons = document.querySelectorAll('.pattern-viewport-controls button');
  var frame = document.querySelector('.pattern-preview-frame');
  buttons.forEach(function(btn) {
    btn.addEventListener('click', function() {
      buttons.forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      var w = btn.getAttribute('data-width');
      frame.style.maxWidth = w === '100%' ? 'none' : w + 'px';
    });
  });
})();
</script>
</t-define>
</t-extend>
