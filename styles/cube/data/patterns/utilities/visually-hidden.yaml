name: Visually Hidden
source: .visually-hidden
description: Content hidden from sighted users but accessible to screen readers. Used for skip links and aria labels.
notes: |
  The <code>:not(:focus):not(:active)</code> guard means focusable elements
  (like skip links) become visible when they receive keyboard focus.
example: |
  <p><a href="#main-content" class="visually-hidden">Skip to main content</a></p>
  <p><em>(The skip link above is visually hidden — tab to it or inspect the DOM.)</em></p>