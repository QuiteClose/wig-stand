name: Font Stacks
source: ".font-system, .font-mono"
description: System font stacks for body text and monospace. No web fonts required.
notes: |
  <code>.font-system</code> applies the same sans-serif stack used by the
  document global. <code>.font-mono</code> provides a monospace stack for
  code and technical content.
example: |
  <p class="font-system">System sans-serif: system-ui, -apple-system, Segoe UI, Roboto, sans-serif</p>
  <p class="font-mono">System monospace: ui-monospace, SFMono-Regular, Menlo, monospace</p>