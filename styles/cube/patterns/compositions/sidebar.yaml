name: Sidebar
description: Two-column layout where the sidebar has a fixed width and the main content fills the remaining space.
example: |
  <div class="sidebar">
  <aside style="border: 1px dashed currentColor; padding: 0.75rem;">
  <p>Sidebar column</p>
  </aside>
  <main style="border: 1px dashed currentColor; padding: 0.75rem;">
  <p>Main column grows when there is room.</p>
  </main>
  </div>
variants: []
