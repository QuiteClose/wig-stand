name: Button
description: "Button block with variant support. Works on <code>&lt;button&gt;</code> and <code>&lt;a&gt;</code> elements."
example: |
  <p><button class="button" type="button">Default</button></p>
  <p><button class="button" type="button" data-variant="primary">Primary</button>
  <button class="button" type="button" data-variant="ghost">Ghost</button></p>
  <p><a class="button" data-variant="ghost" href="#">Link as button</a></p>
variants:
  - name: primary
    example: '<button class="button" type="button" data-variant="primary">Primary</button>'
  - name: ghost
    example: '<button class="button" type="button" data-variant="ghost">Ghost</button>'
