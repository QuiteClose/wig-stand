<t-extend template="cube:layouts/base.html">
<t-define name="head">
<link rel="stylesheet" t-var:href="document.style.css.path" />
</t-define>
<t-define name="body">
<t-include template="cube:blocks/skip-link.html" />
<header class="marquee-hero" style="background-image: url('/assets/demo/heroes/landing.svg'); background-size: cover; background-position: center;">
<nav aria-label="Site" style="position: absolute; top: 1rem; right: 1.5rem; font-size: 0.8rem;">
<t-for link in site.nav>
<t-let name="full_href"><t-var name="site.path" /><t-var name="link.href" /></t-let>
<a t-var:href="full_href" style="color: var(--color-text-secondary); margin-left: 1em;"><t-var name="link.name" /></a>
</t-for>
</nav>
<h1><t-var name="site.title">Marquee</t-var></h1>
<p class="marquee-tagline"><t-var name="site.tagline">Bold. Beautiful. Built to convert.</t-var></p>
</header>
<main id="main-content" class="wrapper region flow prose">
<t-slot />
</main>
<footer class="marquee-footer wrapper">
<t-raw name="site.footer"><a href="https://github.com/QuiteClose/wig">Get Started with Wig</a>
<p>The web framework for craft-minded builders.</p></t-raw>
</footer>
</t-define>
</t-extend>
