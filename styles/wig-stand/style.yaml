name: wig-stand
depends: [cube]
scheme: mono

tokens:
  viewport:
    min: 320
    max: 1240
  typography:
    base:
      min: 16
      max: 18
    scale:
      min: 1.2
      max: 1.25
    steps:
      above: 5
      below: 2
  spacing:
    base: 16
    scale: 1.5

bundles:
  css:
    cube: cube:cube
    surface:
      - css/surface.css
    chrome:
      - css/blocks/showcase-filters.css
      - css/blocks/style-card.css
      - css/blocks/preview-bar.css
