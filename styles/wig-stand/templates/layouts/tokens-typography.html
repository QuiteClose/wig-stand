<t-extend template="cube:layouts/base.html">
<t-define name="head">
<link rel="stylesheet" t-var:href="assets.cube.css.cube.path" />
<link rel="stylesheet" t-var:href="assets.wig-stand.css.surface.path" />
</t-define>
<t-define name="body">
<t-include template="cube:blocks/skip-link.html" />
<main id="main-content" class="wrapper region flow">
<article class="prose flow">
<t-slot />
<t-if var="document.style.tokens.computed.typography">
<table class="pattern-table">
<thead><tr><th>Step</th><th>Value</th></tr></thead>
<tbody>
<t-for step in document.style.tokens.computed.typography>
<tr>
<td><code><t-var name="step.name" /></code></td>
<td><code><t-var name="step.value" /></code></td>
</tr>
</t-for>
</tbody>
</table>
<h2>Usage</h2>
<table class="pattern-table">
<thead><tr><th>Utility class</th><th>CSS custom property</th></tr></thead>
<tbody>
<t-for step in document.style.tokens.computed.typography>
<tr>
<td><code>.text-<t-var name="step.name" /></code></td>
<td><code>var(--size-<t-var name="step.name" />)</code></td>
</tr>
</t-for>
</tbody>
</table>
<t-else />
<p><em>No typography tokens are defined for the current style.</em></p>
</t-if>
</article>
</main>
</t-define>
</t-extend>
