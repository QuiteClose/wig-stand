<header class="preview-bar">
<a class="preview-bar__back" href="/">&#8592; Back</a>
<h1 class="preview-bar__title"><t-var name="document.title">Preview</t-var></h1>
<div class="preview-bar__controls">
<button type="button" data-device-toggle="desktop" aria-pressed="true">Desktop</button>
<button type="button" data-device-toggle="tablet" aria-pressed="false">Tablet</button>
<button type="button" data-device-toggle="mobile" aria-pressed="false">Mobile</button>
</div>
</header>
<div class="preview-frame" data-device="desktop">
<iframe src="preview/" title="Style preview"></iframe>
</div>
<script>
(function() {
  var buttons = document.querySelectorAll("[data-device-toggle]");
  var frame = document.querySelector(".preview-frame");

  buttons.forEach(function(btn) {
    btn.addEventListener("click", function() {
      buttons.forEach(function(b) { b.setAttribute("aria-pressed", "false"); });
      btn.setAttribute("aria-pressed", "true");
      frame.dataset.device = btn.dataset.deviceToggle;
    });
  });
})();
</script>
