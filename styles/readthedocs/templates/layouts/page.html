<t-extend template="readthedocs:layouts/base.html">
<t-define name="head">
<link rel="stylesheet" t-var:href="assets.readthedocs.css.readthedocs.path" />
</t-define>
<t-define name="body">
<nav class="rtd-sidebar" aria-label="Main navigation">
<div class="rtd-sidebar-brand">
<t-var name="site.title">ReadTheDocs</t-var>
<span class="rtd-version">v0.1.0</span>
</div>
<div class="rtd-search">
<input type="search" placeholder="Search docs" aria-label="Search documentation" />
</div>
<div class="rtd-nav">
<p class="rtd-nav-label">Contents</p>
<ul>
<t-for link in site.nav>
<t-let name="full_href"><t-var name="site.path" /><t-var name="link.href" /></t-let>
<li><a t-var:href="full_href"><t-var name="link.name" /></a></li>
</t-for>
</ul>
</div>
</nav>
<main class="rtd-content">
<t-slot />
<footer class="rtd-footer">
Built with <a href="https://github.com/QuiteClose/wig">Wig</a>. Theme inspired by <a href="https://readthedocs.org">Read the Docs</a>.
</footer>
</main>
</t-define>
</t-extend>
