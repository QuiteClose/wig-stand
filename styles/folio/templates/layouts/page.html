<t-extend template="cube:layouts/base.html">
<t-define name="head">
<link rel="stylesheet" t-var:href="assets.cube.css.cube.path" />
<link rel="stylesheet" t-var:href="assets.highlights.css.colors.path" />
<link rel="stylesheet" t-var:href="assets.highlights.css.syntax.path" />
<link rel="stylesheet" t-var:href="assets.folio.css.folio.path" />
</t-define>
<t-define name="body">
<t-include template="cube:blocks/skip-link.html" />
<header class="folio-header wrapper">
<h1><t-var name="site.title">Folio</t-var></h1>
<nav aria-label="Site">
<t-for link in site.nav>
<t-let name="full_href"><t-var name="site.path" /><t-var name="link.href" /></t-let>
<a t-var:href="full_href" style="margin-right: 1em;"><t-var name="link.name" /></a>
</t-for>
</nav>
</header>
<main id="main-content" class="wrapper region flow prose">
<t-slot />
</main>
<footer class="folio-footer wrapper">
<span>&copy; <t-var name="site.title">Folio</t-var> &middot; Built with <a href="https://github.com/QuiteClose/wig">Wig</a></span>
</footer>
</t-define>
</t-extend>
