<t-extend template="cube:layouts/base.html">
<t-define name="head">
<link rel="stylesheet" t-var:href="document.style.css.path" />
</t-define>
<t-define name="body">
<t-include template="cube:blocks/skip-link.html" />
<div class="dispatch-envelope">
<header class="dispatch-header">
<nav class="repel" aria-label="Site" style="align-items: center;">
<div>
<h1 style="color: #fff; margin: 0;"><t-var name="site.title">Dispatch</t-var></h1>
<p class="dispatch-issue"><t-var name="site.tagline">Style Showcase &middot; Wig Stand</t-var></p>
</div>
<span style="font-size: 0.75rem;">
<t-for link in site.nav>
<t-let name="full_href"><t-var name="site.path" /><t-var name="link.href" /></t-let>
<a t-var:href="full_href" style="color: rgba(255,255,255,0.8); margin-left: 0.75em;"><t-var name="link.name" /></a>
</t-for>
</span>
</nav>
</header>
<main id="main-content" class="region flow prose" style="padding-inline: 2rem;">
<t-slot />
</main>
<footer class="dispatch-footer">
<t-raw name="site.footer">Built with <a href="https://github.com/QuiteClose/wig">Wig</a> &middot; You received this because you love good design.</t-raw>
</footer>
</div>
</t-define>
</t-extend>
