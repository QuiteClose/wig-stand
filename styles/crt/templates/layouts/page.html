<t-extend template="cube:layouts/base.html">
<t-define name="head">
<t-for stylesheet in document.style.bundles.css>
<link rel="stylesheet" t-var:href="stylesheet.path" />
</t-for>
</t-define>
<t-define name="body">
<t-include template="cube:blocks/skip-link.html" />
<header class="wrapper" style="padding-block: 0.5em; border-bottom: 1px solid var(--color-border);">
<nav class="repel" aria-label="Site" style="font-size: 0.8em;">
<code style="color: var(--color-text-secondary);"><t-var name="site.tagline">guest@wigstand:~$</t-var></code>
<span>
<t-for link in site.nav>
<t-let name="full_href"><t-var name="site.path" /><t-var name="link.href" /></t-let>
<a t-var:href="full_href" style="margin-left: 0.5em;"><t-var name="link.name" /></a>
</t-for>
</span>
</nav>
</header>
<main id="main-content" class="wrapper region flow prose">
<t-slot />
</main>
<footer class="crt-status">
<span><t-var name="site.footer">[ EOF ] — built with <a href="https://github.com/QuiteClose/wig">wig</a></t-var></span>
</footer>
</t-define>
</t-extend>
