# Core CUBE CSS for every site style. Link `assets._core.css.cube.path`, then your
# style’s surface/tokens CSS so --color-*, --size-step-*, and --space-* resolve.

name: _core

bundles:
  css:
    cube:
      - _core/css/globals/reset.css
      - _core/css/globals/document.css
      - _core/css/fonts/system.css
      - _core/css/compositions/center.css
      - _core/css/compositions/cluster.css
      - _core/css/compositions/flow.css
      - _core/css/compositions/grid.css
      - _core/css/compositions/region.css
      - _core/css/compositions/repel.css
      - _core/css/compositions/sidebar.css
      - _core/css/compositions/stack.css
      - _core/css/compositions/switcher.css
      - _core/css/compositions/wrapper.css
      - _core/css/utilities/indent.css
      - _core/css/utilities/text-colors.css
      - _core/css/utilities/text-sizes.css
      - _core/css/utilities/visually-hidden.css
      - _core/css/utilities/radius.css
      - _core/css/blocks/button.css
      - _core/css/blocks/tag.css
      - _core/css/blocks/prose.css
      - _core/css/exceptions/narrow.css
      - _core/css/globals/syntax.css
