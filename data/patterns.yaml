categories:
  - name: Compositions
    patterns:
      - id: center
        title: Center
        description: Horizontally centres a block-level element with a max-width and consistent padding.
        example: |
          <div class="center">
          <p>Centered column with max width and horizontal padding.</p>
          </div>

      - id: cluster
        title: Cluster
        description: Groups inline or flex items with consistent gap spacing. Wraps naturally.
        example: |
          <div class="cluster">
          <span>Tag A</span>
          <span>Tag B</span>
          <span>Tag C</span>
          </div>

      - id: flow
        title: Flow
        description: "The lobotomised owl: every sibling element receives consistent vertical spacing via <code>margin-block-start</code>."
        example: |
          <div class="flow">
          <h3>Flow composition</h3>
          <p>Every sibling element receives consistent vertical spacing.</p>
          <p>The lobotomised owl selector targets every element preceded by another.</p>
          <ul>
          <li>Item one</li>
          <li>Item two</li>
          </ul>
          </div>

      - id: grid
        title: Grid
        description: Auto-fill grid with a minimum item size. Items wrap responsively without media queries.
        example: |
          <div class="grid" style="--grid-min-item-size: 10rem;">
          <div style="padding: 1rem; border: 1px dashed currentColor;">Cell A</div>
          <div style="padding: 1rem; border: 1px dashed currentColor;">Cell B</div>
          <div style="padding: 1rem; border: 1px dashed currentColor;">Cell C</div>
          </div>

      - id: region
        title: Region
        description: Adds vertical section padding. Used to separate major page sections.
        example: |
          <section class="region" style="background: color-mix(in srgb, CanvasText 3%, transparent);">
          <p>Region: vertical section padding.</p>
          </section>

      - id: repel
        title: Repel
        description: Pushes two child elements to opposite ends of a flex container. Classic header/navbar pattern.
        example: |
          <div class="repel" style="border: 1px dashed currentColor; padding: 0.5rem;">
          <span>Brand</span>
          <nav class="cluster">Nav A · Nav B</nav>
          </div>

      - id: sidebar
        title: Sidebar
        description: Two-column layout where the sidebar has a fixed width and the main content fills the remaining space.
        example: |
          <div class="sidebar">
          <aside style="border: 1px dashed currentColor; padding: 0.75rem;">
          <p>Sidebar column</p>
          </aside>
          <main style="border: 1px dashed currentColor; padding: 0.75rem;">
          <p>Main column grows when there is room.</p>
          </main>
          </div>

      - id: stack
        title: Stack
        description: "Vertical stacking with consistent spacing. Like <code>flow</code> but with configurable <code>--stack-space</code>."
        example: |
          <div class="stack">
          <p style="border: 1px dashed currentColor; padding: 0.5rem;">First block in the stack.</p>
          <p style="border: 1px dashed currentColor; padding: 0.5rem;">Second block, spaced with --stack-space.</p>
          <p style="border: 1px dashed currentColor; padding: 0.5rem;">Third block.</p>
          </div>

      - id: switcher
        title: Switcher
        description: "Side-by-side when space allows, stacked when it doesn\u2019t. No media queries \u2014 pure CSS container logic."
        example: |
          <div class="switcher">
          <div style="border: 1px dashed currentColor; padding: 0.75rem;">Item A</div>
          <div style="border: 1px dashed currentColor; padding: 0.75rem;">Item B</div>
          </div>

      - id: wrapper
        title: Wrapper
        description: Constrains content to a maximum inline size with horizontal padding. The bread-and-butter container.
        example: |
          <div class="wrapper" style="background: color-mix(in srgb, CanvasText 3%, transparent);">
          <p>Wrapper: max width with horizontal padding.</p>
          </div>

  - name: Utilities
    patterns:
      - id: indent
        title: Indent
        description: Adds an inline-start border with padding. Useful for callouts or quoted material.
        example: |
          <p class="indent" style="padding-inline-start: 0.75rem;">Indented block with inline-start border.</p>

      - id: text-colors
        title: Text Colors
        description: Utility classes for semantic text colouring.
        example: |
          <p class="text-primary">Primary text colour</p>
          <p class="text-secondary">Secondary text colour</p>
          <p class="text-link">Link-role text colour</p>

      - id: text-sizes
        title: Text Sizes
        description: Utility classes mapped to the type scale steps.
        example: |
          <p class="text-step--1">Step -1 (small)</p>
          <p class="text-step-0">Step 0 (base)</p>
          <p class="text-step-2">Step 2 (large)</p>

      - id: visually-hidden
        title: Visually Hidden
        description: Content hidden from sighted users but accessible to screen readers. Used for skip links and aria labels.
        example: |
          <p><a href="#main-content" class="visually-hidden">Skip to main content</a></p>
          <p><em>(The skip link above is visually hidden — tab to it or inspect the DOM.)</em></p>

      - id: radius
        title: Radius
        description: "Border radius token applied via <code>--radius-s</code>. Controlled globally per style."
        example: |
          <div style="border: 2px solid currentColor; border-radius: var(--radius-s, 0.25rem); padding: 1rem; max-width: 16rem;">
          <p>Box with <code>--radius-s</code> border radius.</p>
          </div>

  - name: Blocks
    patterns:
      - id: button
        title: Button
        description: "Button block with variant support. Works on <code>&lt;button&gt;</code> and <code>&lt;a&gt;</code> elements."
        example: |
          <p><button class="button" type="button">Default</button></p>
          <p><button class="button" type="button" data-variant="primary">Primary</button>
          <button class="button" type="button" data-variant="ghost">Ghost</button></p>
          <p><a class="button" data-variant="ghost" href="#">Link as button</a></p>

      - id: tag
        title: Tag
        description: Small inline label for categorisation. Supports active variant and link usage.
        example: |
          <p>
          <span class="tag">topic</span>
          <a class="tag" href="#">tag link</a>
          <span class="tag" data-variant="active">active</span>
          </p>

      - id: prose
        title: Prose
        description: "Rich text block with comfortable measure, vertical rhythm, and typographic defaults for long-form content."
        example: |
          <article class="prose stack">
          <h3>Prose block</h3>
          <p>Paragraph with comfortable measure and vertical rhythm. The <code>prose</code> block sets <code>max-inline-size</code> and styles headings, lists, links, and other elements for reading.</p>
          <ul>
          <li>First item</li>
          <li>Second item</li>
          </ul>
          </article>

      - id: skip-link
        title: Skip Link
        description: Accessibility block for keyboard users to skip past navigation.
        example: |
          <a href="#main-content" class="visually-hidden">Skip to main content</a>

  - name: Exceptions
    patterns:
      - id: narrow
        title: Narrow
        description: "Exception that constrains content to a narrower width. Applied via <code>data-exception=\"narrow\"</code>."
        example: |
          <div class="center">
          <div data-exception="narrow" style="border: 1px dashed currentColor; padding: 0.75rem;">
          <p>Narrow exception inside a wide wrapper. Content is more tightly constrained.</p>
          </div>
          </div>

  - name: Globals
    patterns:
      - id: syntax
        title: Syntax Highlighting
        description: Global token classes for code syntax colouring. Applied by the syntax-highlighting pipeline.
        example: |
          <pre><code><span class="keyword">const</span> <span class="variable">x</span><span class="punctuation">:</span> <span class="type">u32</span> <span class="operator">=</span> <span class="number">42</span><span class="punctuation">;</span> <span class="comment">// example</span></code></pre>

      - id: fonts
        title: Font Stacks
        description: System font stacks for body text and monospace. No web fonts required.
        example: |
          <p>System sans-serif stack: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif</p>
          <p style="font-family: var(--font-mono, ui-monospace, monospace);">System monospace stack: ui-monospace, SFMono-Regular, Menlo, monospace</p>
